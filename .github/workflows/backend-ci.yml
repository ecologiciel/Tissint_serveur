name: Backend CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tissint_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U postgres -d tissint_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      API_KEY: tissint_ci_key
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/tissint_test
      TINSSIT_SKIP_MODEL_LOAD: "1"
      STORAGE_DIR: .runtime/ci-storage
      CORS_ALLOWED_ORIGINS: "*"
      PYTHONUTF8: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Compile Python modules
        run: python -m compileall main.py schemas.py database.py billing.py security.py

      - name: Run API tests
        run: python -m pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Node dependencies
        run: npm install

      - name: Typecheck API client
        run: npm run lint

      - name: Verify OpenAPI and generated types
        run: |
          npm run api:contract
          git diff --exit-code docs/openapi.json src/api/generated/types.ts
