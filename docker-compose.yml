version: "3.8"

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: meteorite_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecretProductionPassword2026}
      POSTGRES_DB: ${DB_NAME:-meteorite_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-meteorite_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meteorite_api
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-SecretProductionPassword2026}@postgres_db:5432/${DB_NAME:-meteorite_db}
      API_KEY: ${API_KEY:-meteorite_secret_prod_key_2026}
      STORAGE_DIR: /app/storage_vessel
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      UNLIMITED_SCAN_EMAILS: ${UNLIMITED_SCAN_EMAILS:-user@tissint.ma}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      TORCH_HOME: /app/.cache/torch
    volumes:
      - meteorite_storage:/app/storage_vessel
      - torch_cache:/app/.cache/torch

volumes:
  postgres_data:
  meteorite_storage:
  torch_cache:
