version: "3.8"

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: meteorite_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecretProductionPassword2026}
      POSTGRES_DB: ${DB_NAME:-meteorite_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-meteorite_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meteorite_api
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-SecretProductionPassword2026}@postgres_db:5432/${DB_NAME:-meteorite_db}
      API_KEY: ${API_KEY:-meteorite_secret_prod_key_2026}
      STORAGE_DIR: /app/storage_vessel
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-tissint}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_PRESIGNED_TTL_SECONDS: ${S3_PRESIGNED_TTL_SECONDS:-900}
      DATASET_MAX_FILE_SIZE_BYTES: ${DATASET_MAX_FILE_SIZE_BYTES:-20971520}
      DATASET_LEASE_MINUTES: ${DATASET_LEASE_MINUTES:-15}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      UNLIMITED_SCAN_EMAILS: ${UNLIMITED_SCAN_EMAILS:-user@tissint.ma}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID:-}
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      TORCH_HOME: /app/.cache/torch
    volumes:
      - meteorite_storage:/app/storage_vessel
      - torch_cache:/app/.cache/torch

  dataset_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meteorite_dataset_worker
    restart: always
    depends_on:
      postgres_db:
        condition: service_healthy
    command: ["python", "expert_worker.py"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-SecretProductionPassword2026}@postgres_db:5432/${DB_NAME:-meteorite_db}
      STORAGE_DIR: /app/storage_vessel
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PREFIX: ${S3_PREFIX:-tissint}
      S3_REGION: ${S3_REGION:-}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_PRESIGNED_TTL_SECONDS: ${S3_PRESIGNED_TTL_SECONDS:-900}
      DATASET_MAX_FILE_SIZE_BYTES: ${DATASET_MAX_FILE_SIZE_BYTES:-20971520}
      DATASET_LEASE_MINUTES: ${DATASET_LEASE_MINUTES:-15}
      DATASET_WORKER_BATCH_SIZE: ${DATASET_WORKER_BATCH_SIZE:-4}
      DATASET_WORKER_INTERVAL_SECONDS: ${DATASET_WORKER_INTERVAL_SECONDS:-2}
      DATASET_WORKER_STALE_SECONDS: ${DATASET_WORKER_STALE_SECONDS:-900}
      PYTHONIOENCODING: utf-8
      PYTHONUTF8: "1"
      TORCH_HOME: /app/.cache/torch
    volumes:
      - meteorite_storage:/app/storage_vessel
      - torch_cache:/app/.cache/torch

volumes:
  postgres_data:
  meteorite_storage:
  torch_cache:
